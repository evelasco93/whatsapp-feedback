services:
  - type: web
    name: whatsapp-feedback-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS_RAW
        value: https://<tu-proyecto>.vercel.app
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: whatsapp_feedback
      - key: MONGODB_COLLECTION_NAME
        value: mensajes
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: VALIDATE_TWILIO_SIGNATURE
        value: "true"
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: SSE_RETRY_MS
        value: "3000"
